  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LFC Fixtures"/>
  <meta name="theme-color" content="#C8102E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C8102E;--red-dk:#8B0C1F;--gold:#F6C519;--teal:#00B2A9;--teal-dk:#008f87}
    [data-theme="dark"]{--bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--border:#242424;--white:#F5F5F0;--muted:#777;--muted2:#444;--hero-grad:linear-gradient(145deg,#1a0008 0%,#0d0003 60%,#0a0010 100%);--hero-border:rgba(200,16,46,0.45);--hero-glow:0 0 60px rgba(200,16,46,0.12);--header-bg:rgba(13,13,13,0.94);--nav-bg:#111;--search-bg:#1a1a1a}
    [data-theme="light"]{--bg:#F0EFEA;--bg2:#FFFFFF;--bg3:#E6E5E0;--border:#D0CFCA;--white:#111;--muted:#666;--muted2:#AAA;--hero-grad:linear-gradient(145deg,#8B0C1F 0%,#C8102E 60%,#a00020 100%);--hero-border:rgba(200,16,46,0.6);--hero-glow:0 4px 32px rgba(200,16,46,0.25);--header-bg:rgba(240,239,234,0.94);--nav-bg:#FFF;--search-bg:#FFF}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;transition:background .3s,color .3s;overscroll-behavior-y:contain}
    .offline-banner{background:#333;color:#fff;text-align:center;font-size:12px;font-weight:600;letter-spacing:.5px;padding:6px 16px;display:none}
    .offline-banner.show{display:block}
    header{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:100;transition:background .3s,border-color .3s}
    .crest{width:34px;height:34px;object-fit:contain;flex-shrink:0;border-radius:50%}
    [data-theme="light"] .crest{background:var(--teal);padding:4px}
    .header-text h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;line-height:1;color:var(--white)}
    .header-text p{font-size:11px;color:var(--muted);margin-top:1px}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:7px}
    .btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:color .2s,border-color .2s,background .3s;flex-shrink:0}
    .btn-icon:hover{color:var(--white);border-color:var(--muted)}
    .btn-icon.spinning{animation:spin .75s linear infinite}
    .search-wrap{padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);transition:background .3s;display:none}
    .search-wrap.visible{display:block}
    .search-inner{display:flex;align-items:center;gap:8px;background:var(--search-bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;transition:border-color .2s}
    .search-inner:focus-within{border-color:var(--red)}
    [data-theme="light"] .search-inner:focus-within{border-color:var(--teal)}
    .search-icon{color:var(--muted);font-size:14px;flex-shrink:0}
    .search-input{background:none;border:none;outline:none;color:var(--white);font-family:'Inter',sans-serif;font-size:14px;width:100%;min-width:0}
    .search-input::placeholder{color:var(--muted)}
    .search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;display:none}
    .search-clear.visible{display:block}
    .filter-section{border-bottom:2px solid var(--border);background:var(--bg);transition:background .3s,border-color .3s}
    [data-theme="light"] .filter-section{border-bottom-color:var(--teal)}
    .filter-row{padding:8px 20px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-row+.filter-row{border-top:1px solid var(--border)}
    .tab{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;letter-spacing:.3px}
    .tab img{width:14px;height:14px;object-fit:contain}
    .tab:hover{color:var(--white);border-color:var(--muted)}
    .tab.active{background:var(--red);border-color:var(--red);color:#fff}
    [data-theme="light"] .tab.active{background:var(--teal);border-color:var(--teal)}
    .tab.active-home{background:rgba(200,16,46,.12);border-color:var(--red);color:var(--red)}
    .tab.active-away{background:rgba(0,178,169,.12);border-color:var(--teal);color:var(--teal)}
    .ptr-indicator{text-align:center;font-size:12px;color:var(--muted);height:0;opacity:0;transition:height .3s,opacity .3s;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:6px}
    .ptr-indicator.visible{height:44px;opacity:1}
    .ptr-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%}
    .ptr-spinner.spin{animation:spin .75s linear infinite}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);transition:background .3s,border-color .3s}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;gap:3px;transition:color .2s}
    .nav-item.active{color:var(--red)}
    [data-theme="light"] .nav-item.active{color:var(--teal)}
    .nav-icon{font-size:20px;line-height:1}
    .page{display:none;padding-bottom:90px}
    .page.active{display:block}
    .content-wrap{max-width:680px;margin:0 auto}
    [data-theme="dark"] .skeleton-hero,[data-theme="dark"] .skeleton-card{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite linear}
    [data-theme="light"] .skeleton-hero,[data-theme="light"] .skeleton-card{background:linear-gradient(90deg,#e0dfda 25%,#eeedea 50%,#e0dfda 75%);background-size:200% 100%;animation:shimmer 1.4s infinite linear}
    .skeleton-wrap{padding:20px}
    .skeleton-hero{height:230px;border-radius:18px;margin-bottom:20px}
    .skeleton-card{height:68px;border-radius:8px;margin-bottom:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .hero-section{padding:20px 20px 0}
    .section-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    [data-theme="light"] .section-label{color:var(--teal)}
    .hero-card{background:var(--hero-grad);border:1px solid var(--hero-border);border-radius:18px;padding:20px 18px;box-shadow:var(--hero-glow);position:relative;overflow:hidden;margin-bottom:16px}
    .hero-card.matchday{animation:matchglow 2s ease-in-out infinite}
    @keyframes matchglow{0%,100%{box-shadow:0 0 30px rgba(200,16,46,0.2)}50%{box-shadow:0 0 60px rgba(200,16,46,0.5),0 0 20px rgba(200,16,46,0.3)}}
    .hero-card::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 65%);pointer-events:none}
    .hero-comp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .hero-comp-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:#fff}
    .hero-comp-badge img{width:18px;height:18px;object-fit:contain}
    .hero-round-badge{font-size:11px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px}
    .hero-matchup{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px}
    .hero-team{text-align:center;flex:1}
    .hero-badge-wrap{width:60px;height:60px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
    .hero-badge-wrap img{max-width:60px;max-height:60px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
    .lfc-hero-logo{filter:brightness(10) drop-shadow(0 2px 8px rgba(0,0,0,.4)) !important}
    .hero-team-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.8px;line-height:1.2;word-break:break-word;color:#fff}
    .hero-vs{font-family:'Bebas Neue',sans-serif;font-size:30px;color:rgba(255,255,255,.18);flex-shrink:0}
    .hero-meta{display:flex;flex-wrap:wrap;gap:6px 14px}
    .hero-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.65)}
    .ha-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:5px}
    .ha-home{background:rgba(255,255,255,.15);color:#fff}
    .ha-away{background:rgba(0,0,0,.25);color:rgba(255,255,255,.7)}
    .ha-neutral{background:rgba(246,197,25,.2);color:var(--gold)}
    .countdown-wrap{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
    .countdown-row{display:flex;gap:8px}
    .countdown-item{flex:1;text-align:center;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px 4px}
    .countdown-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:#fff}
    .countdown-unit{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:3px}
    .matchday-banner{text-align:center;padding:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff}

// Fuzzy comp logo lookup — falls back to partial keyword matching
function getCompLogo(c) {
  if (!c) return null;
  const k = c.toLowerCase().trim();
  if (COMP_LOGOS[k]) return COMP_LOGOS[k];
  // Partial keyword fallback
  if (k.includes('premier'))                      return COMP_LOGOS['premier league'];
  if (k.includes('champions'))                    return COMP_LOGOS['champions league'];
  if (k.includes('europa'))                       return COMP_LOGOS['europa league'];
  if (k.includes('fa cup') || k === 'fa cup')    return COMP_LOGOS['fa cup'];
  if (k.includes('carabao') || k.includes('efl cup') || k.includes('league cup')) return COMP_LOGOS['carabao cup'];
  if (k.includes('community shield'))             return COMP_LOGOS['community shield'];
  if (k.includes('club world'))                   return COMP_LOGOS['club world cup'];
  return null;
}

function getClubBadge(name) {
  if (!name) return null;
  const raw = name.toLowerCase().trim();
  // Direct
  if (BADGES[raw]) return BADGES[raw];
  // Strip FC/AFC etc
  const stripped = raw
    .replace(/^(fc|afc|as|ss|ac|rb|rsc|sl|bv|vfb|psv|cf)\s+/,'')
    .replace(/\s+(fc|afc|cf|sc|sk|ac|united|city|town|rovers|wanderers|athletic|albion|hotspur|county|palace|forest|wednesday|north end|park rangers)$/,'')
    .trim();
  if (BADGES[stripped]) return BADGES[stripped];
  // Partial - longest keys first so specific names beat short/generic ones
  const sorted = Object.entries(BADGES).sort((a,b) => b[0].length - a[0].length);
  for (const [k,u] of sorted) {
    if (k.length < 4) continue;
    if (raw.includes(k) || k.includes(raw)) return u;
  }

// H2H lookup: find results for a given opponent name
function getH2H(opponentName) {
  if (!opponentName) return null;

  function norm(n) {
    return n.toLowerCase().trim()
      // Replace & with 'and' and vice-versa variants
      .replace(/\s*&\s*/g, ' and ')
      // Common short-name expansions
      .replace(/^wolves$/,            'wolverhampton wanderers')
      .replace(/^spurs$/,             'tottenham hotspur')
      .replace(/^man city$/,          'manchester city')
      .replace(/^man utd?$/,          'manchester united')
      .replace(/^man united$/,        'manchester united')
      .replace(/nott'?m? forest/,     'nottingham forest')
      .replace(/^newcastle$/,         'newcastle united')
      .replace(/^leicester$/,         'leicester city')
      .replace(/^ipswich$/,           'ipswich town')
      .replace(/^west ham$/,          'west ham united')
      .replace(/^tottenham$/,         'tottenham hotspur')
      .replace(/^coventry$/,          'coventry city')
      .replace(/^brighton$/,          'brighton and hove albion')
      .replace(/^bournemouth$/,       'bournemouth')
      .replace(/^birmingham$/,        'birmingham city')
      .replace(/^leeds$/,             'leeds united')
      .replace(/^palace$/,            'crystal palace')
      .replace(/^forest$/,            'nottingham forest')
      // Strip common suffixes/prefixes
      .replace(/\s+fc$/, '').replace(/^fc\s+/, '')
      .replace(/\s+afc$/, '').replace(/^afc\s+/, '')
      .replace(/\s+cf$/, '').replace(/^cf\s+/, '')
      .trim();
  }

  // Also normalise the data keys (replace & with 'and')
  function normKey(k) { return k.replace(/\s*&\s*/g, ' and '); }

  const q = norm(opponentName);

  // Build a normalised map of all data keys on first call
  if (!getH2H._map) {
    getH2H._map = {};
    for (const [k, v] of Object.entries(H2H_DATA)) {
      getH2H._map[normKey(k)] = v.results;
    }
  }
  const map = getH2H._map;

  // 1. Exact match
  if (map[q]) return map[q].slice().sort((a,b)=>(b.iso||"").localeCompare(a.iso||""));

  // 2. Starts-with match (e.g. "ac sparta prague" matches "ac sparta prague")
  for (const [k, v] of Object.entries(map)) {
    if (k === q) return v.slice().sort((a,b)=>(b.iso||"").localeCompare(a.iso||""));
    if (k.startsWith(q + ' ') || q.startsWith(k + ' ')) return v.slice().sort((a,b)=>(b.iso||"").localeCompare(a.iso||""));
  }

  // 3. Contains match — opponent name appears in key or vice versa
  for (const [k, v] of Object.entries(map)) {
    if (k.includes(q) || q.includes(k)) return v.slice().sort((a,b)=>(b.iso||"").localeCompare(a.iso||""));
  }

  // 4. Word overlap — share most significant words
  const qWords = q.split(' ').filter(w => w.length > 3);
  for (const [k, v] of Object.entries(map)) {
    const kWords = k.split(' ').filter(w => w.length > 3);
    const shared = qWords.filter(w => kWords.includes(w));
    if (shared.length >= 1 && shared.length >= Math.min(qWords.length, kWords.length)) {
      return v.slice().sort((a,b)=>(b.iso||"").localeCompare(a.iso||""));
    }
  }

  return null;
}

      future: future.map(f => ({...f, start:f.start.toISOString(), end:f.end?f.end.toISOString():null})),
      past:   past.map(f   => ({...f, start:f.start.toISOString(), end:f.end?f.end.toISOString():null}))

// ICS Parser
function parseICS(text) {
  const lines = text.replace(/\r\n[ \t]/g, '').replace(/\r/g, '').split('\n');
  const now = new Date(); now.setHours(0,0,0,0);
  const future=[], past=[];
  let cur=null, inAlarm=false;
  for (const raw of lines) {
    const line = raw.trim();
    if (line==='BEGIN:VALARM') { inAlarm=true; continue; }
    if (line==='END:VALARM')   { inAlarm=false; continue; }
    if (inAlarm) continue;
    if (line==='BEGIN:VEVENT') { cur={}; continue; }
    if (line==='END:VEVENT' && cur) {
      if (cur.start) {
        const e=enrich(cur);
        // Only keep events that are actual matches (have a valid v/vs pattern)
        if (e.isHome !== null) {
          if (cur.start<now) past.push(e); else future.push(e);
        }
      }
      cur=null; continue;
    }
    if (!cur) continue;
    const ci = line.indexOf(':'); if (ci===-1) continue;
    const key = line.slice(0,ci).split(';')[0].toUpperCase();
    const val = line.slice(ci+1);
    if (key==='SUMMARY')     cur.summary     = dv(val);
    if (key==='LOCATION')    cur.location    = dv(val);
    if (key==='DESCRIPTION') cur.description = dvDesc(val);
    if (key==='URL')         cur.url         = val.trim();
    if (key==='DTSTART') { const p=pd(val,line); cur.start=p.date; cur.allDay=p.allDay; }
    if (key==='DTEND')   { const p=pd(val,line); cur.end=p.date; }
  }
  future.sort((a,b)=>a.start-b.start);
  past.sort((a,b)=>b.start-a.start);
  return {future, past};
}
function pd(v,fl) {
  const allDay = fl.includes('VALUE=DATE') || /^\d{8}$/.test(v.trim());
  const s=v.trim(); let date;
  if (allDay) {
    date = new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
  } else {
    const y=+s.slice(0,4),mo=+s.slice(4,6)-1,d=+s.slice(6,8),h=+s.slice(9,11),mi=+s.slice(11,13),sc=+s.slice(13,15);
    date = s.endsWith('Z') ? new Date(Date.UTC(y,mo,d,h,mi,sc)) : new Date(y,mo,d,h,mi,sc);
  }
  return {date, allDay};
}
function dv(v) {
  return v.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/gi,' ').replace(/\\\\/g,'\\').trim();
}
function dvDesc(v) {
  return v.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/gi,'\n').replace(/\\\\/g,'\\').trim();
}
function enrich(e) {
  const s=e.summary||''; let comp='',home='',away='',isHome=null;
  if (e.description) {
    const fl = e.description.split('\n')[0].trim();
    const pi = fl.indexOf('|');
    comp = (pi>0 ? fl.slice(0,pi) : fl).trim();
  }
  const vs = s.split(/\s+v(?:s)?\.?\s+/i);
  if (vs.length===2) { home=vs[0].trim(); away=vs[1].trim(); }
  const lfc = ['liverpool','lfc','liverpool fc'];
  if (lfc.some(n=>home.toLowerCase().includes(n))) isHome=true;
  if (lfc.some(n=>away.toLowerCase().includes(n))) isHome=false;
  const opponent = isHome===true ? away : isHome===false ? home : s;
  const venue = e.location || (isHome===true ? 'Anfield' : '');
  return {...e, competition:comp, opponent:opponent||s, isHome, round:'', venue};
}

function renderFixtures() {
  clearInterval(cdTimer);
  const list = getFiltered();
  const el = $id('fixturesContent');
  if (!list.length) { el.innerHTML='<div class="no-results">No fixtures match your filters.</div>'; return; }

  if (list.length>1) {
    html += '<div class="upcoming-strip">';

      const k=f.start.getFullYear()+'-'+String(f.start.getMonth()+1).padStart(2,'0');
      (byMonth[k]=byMonth[k]||[]).push(f);
    });
    Object.entries(byMonth).forEach(([k,fixtures]) => {
      const [y,m]=k.split('-');
      const label = new Date(+y,+m-1).toLocaleString('en-GB',{month:'long',year:'numeric'}).toUpperCase();

    wrap.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; }, {passive:true});

      const dx=startX-e.changedTouches[0].clientX;
      if(dx>50) wrap.classList.add('swiped');
      else if(dx<-20) wrap.classList.remove('swiped');
    }, {passive:true});
    wrap.querySelector('.fixture-swipe-action')?.addEventListener('click', () => {
      const idx=+wrap.dataset.idx;
      shareFixture(list[idx]);
      wrap.classList.remove('swiped');
    });
  });

  // Wire H2H toggles
  el.querySelectorAll('.h2h-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel=btn.nextElementSibling;
      const open=panel.classList.toggle('open');
      btn.classList.toggle('open',open);
      if (open && !panel.dataset.loaded) {
        panel.dataset.loaded='1';
        renderH2H(btn.dataset.opponent, btn.dataset.venue, panel);
      }
    });
  });

  startCountdown(list[0]);
}

// H2H panel - uses embedded spreadsheet data + localStorage overrides
function renderH2H(opponentName, upcomingVenue, panelEl) {
  // Check localStorage for results added since the spreadsheet
  const overrides = JSON.parse(localStorage.getItem(RESULTS_KEY)||'{}');
  const h2hResults = getH2H(opponentName) || [];

  // Merge in any localStorage overrides for this opponent
  const overrideKey = opponentName.toLowerCase();
  const extra = overrides[overrideKey] || [];

  // Combine, with overrides at the front (most recent first)
  const allResults = [...extra, ...h2hResults];

  if (!allResults.length) {
    panelEl.innerHTML = '<div class="h2h-loading">No previous meetings found.</div>';
    return;
  }

  // Separate home and away
  const homeRes = allResults.filter(r => r.v==='H');
  const awayRes = allResults.filter(r => r.v==='A');
  const lastHome = homeRes[0];
  const lastAway = awayRes[0];

  // Form string: last 5 results
  const form5 = allResults.slice(0,5).map(r => {
    const cls = r.r==='W'?'form-w':r.r==='L'?'form-l':'form-d';
    return '<span class="form-dot '+cls+'">'+r.r+'</span>';
  }).join('');
  // Overall record
  const total=allResults.length, wins=allResults.filter(r=>r.r==='W').length,
        draws=allResults.filter(r=>r.r==='D').length, losses=allResults.filter(r=>r.r==='L').length;

  let html = '<div class="h2h-header-row"><div class="h2h-title">vs '+esc(opponentName)+'</div>'+
    '<div class="h2h-record">P'+total+' W'+wins+' D'+draws+' L'+losses+'</div></div>'+
    (form5 ? '<div class="h2h-form">Recent: '+form5+'</div>' : '');

  // Summary line
  if (lastHome || lastAway) {
    html += '<div class="h2h-summary">';
    if (lastHome) {
      const res = lastHome.r||'D';
      const col = res==='W'?'#3dba78':res==='L'?'var(--red)':'var(--gold)';
      html += '<div class="h2h-summary-item">Last home: <strong style="color:'+col+'">'+lastHome.s+'</strong> <span style="color:'+col+'">'+res+'</span></div>';
    }
    if (lastAway) {
      const res = lastAway.r||'D';
      const col = res==='W'?'#3dba78':res==='L'?'var(--red)':'var(--gold)';
      html += '<div class="h2h-summary-item">Last away: <strong style="color:'+col+'">'+lastAway.s+'</strong> <span style="color:'+col+'">'+res+'</span></div>';
    }
    html += '</div>';
  }

  // Last 6 meetings
  allResults.slice(0,6).forEach(r => {
    // r.r is W/D/L pre-calculated from LFC's perspective
    const resultCls = r.r==='W'?'win':r.r==='L'?'loss':'draw';
    html += '<div class="h2h-row">' +
      '<span class="h2h-date">'+r.d+'</span>' +
      '<span style="margin-left:6px"><span class="ha-small '+(r.v==='H'?'home':'away')+'">'+r.v+'</span></span>' +
      '<span class="h2h-comp">'+esc(r.c)+'</span>' +
      '<span class="h2h-score '+resultCls+'">'+r.s+'</span></div>';
  });

  panelEl.innerHTML = html;
}

// Auto-save results to localStorage when a fixture date passes
// This runs on boot and checks if any upcoming fixtures have now been played
// (In a real scenario the user would need to enter the score, but we detect date-passed)

// Results page
function renderResults() {
  const el = $id('resultsContent');
  if (!allPast.length) {
    el.innerHTML = '<div class="state-view"><div class="state-icon">\uD83D\uDCED</div><div class="state-title">No Results Yet</div><div class="state-msg">Past fixtures will appear here once the season gets underway.</div></div>';
    $id('statsStrip').innerHTML = '';
    return;
  }

  // Season stats
  const overrides = JSON.parse(localStorage.getItem(RESULTS_KEY)||'{}');
  let w=0,d=0,l=0,gf=0,ga=0;
  allPast.forEach(f => {
    const key = f.opponent.toLowerCase();
    const extra = overrides[key]||[];
    // Try to find a result for this specific match from overrides
    const matchResult = extra.find(r => r.matchDate === f.start.toISOString().slice(0,10));
    if (matchResult) {
      const [lg,og] = matchResult.s.split('-').map(Number);
      gf+=lg; ga+=og;
      if(lg>og) w++; else if(lg<og) l++; else d++;
    }
  });
  const played=w+d+l;
  $id('statsStrip').innerHTML = '<div class="stats-strip">' +
    '<div class="stat-item"><div class="stat-num">'+(played||allPast.length)+'</div><div class="stat-label">Played</div></div>' +
    (played?'<div class="stat-item"><div class="stat-num green">'+w+'</div><div class="stat-label">Won</div></div>' +
    '<div class="stat-item"><div class="stat-num gold">'+d+'</div><div class="stat-label">Drawn</div></div>' +
    '<div class="stat-item"><div class="stat-num red">'+l+'</div><div class="stat-label">Lost</div></div>':
    '<div class="stat-item"><div class="stat-num">'+(allPast.filter(f=>f.isHome===true).length)+'</div><div class="stat-label">Home</div></div>' +
    '<div class="stat-item"><div class="stat-num">'+(allPast.filter(f=>f.isHome===false).length)+'</div><div class="stat-label">Away</div></div>') +
    '</div>';

  let html = '<div class="fixtures-section">';
  const byMonth={};
  allPast.forEach(f => {
    const k=f.start.getFullYear()+'-'+String(f.start.getMonth()+1).padStart(2,'0');
    (byMonth[k]=byMonth[k]||[]).push(f);
  });
  Object.entries(byMonth).forEach(([k,fixtures]) => {
    const [y,m]=k.split('-');
    const label=new Date(+y,+m-1).toLocaleString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
    html += '<div class="month-group"><div class="month-header"><span>'+label+'</span><span class="month-count">'+fixtures.length+'</span></div>';
    fixtures.forEach(f => {
      const d=f.start, ob=getClubBadge(f.opponent);
      const cCls=getCompClass(f.competition), cLogo=getCompLogo(f.competition);
      const accentCls=getAccentClass(f.competition);
      const haSmall=f.isHome===true?'home':f.isHome===false?'away':'neutral';
      // Look up result from H2H data using ISO date
      const h2h = getH2H(f.opponent)||[];
      const matchISO = f.start.toISOString().slice(0,10); // 'YYYY-MM-DD'
      const found = h2h.find(r => r.iso === matchISO);
      const scoreDisplay = found ? found.s : 'TBD';
      const resultCls = found ? (found.r==='W'?'win':found.r==='L'?'loss':'draw') : 'tbd';
      html += '<div class="result-card"><div class="fixture-accent '+accentCls+'"></div><div class="result-inner">' +
        '<div class="fixture-date-col"><div class="fixture-day">'+d.getDate()+'</div><div class="fixture-dow">'+d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()+'</div></div>' +
        '<div class="fixture-divider"></div>' +
        '<div class="fixture-main"><div class="fixture-opponent">' +
        (ob?'<img class="opp-badge" src="'+ob+'" alt="'+esc(f.opponent)+'" onerror="this.style.display=\'none\'"/>':'') +
        '<span class="opp-name">'+esc(f.opponent)+'</span></div>' +
        '<div class="fixture-sub"><span class="comp-badge '+cCls+'">'+(cLogo?'<img src="'+cLogo+'" alt="" onerror="this.style.display=\'none\'"/>':'')+compShort(f.competition)+'</span>' +
        '<span class="ha-small '+haSmall+'">'+(f.isHome===true?'H':'A')+'</span></div></div>' +
        '<div class="result-score '+resultCls+'">'+scoreDisplay+'</div>' +
        '</div></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// Calendar
function initCal() { const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth(); }
function renderCalendar() {
  if (!calYear) initCal();
  $id('calMonthLabel').textContent = new Date(calYear,calMonth).toLocaleString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
  const grid=$id('calGrid'); grid.innerHTML='';
  const allEvents=[...allFixtures,...allPast], matchDays={};
  allEvents.forEach(f => {
    if (f.start.getFullYear()===calYear && f.start.getMonth()===calMonth) {
      const day=f.start.getDate();
      (matchDays[day]=matchDays[day]||[]).push(f);
    }
  });
  const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  for(let i=firstDow-1;i>=0;i--) {
    const c=document.createElement('div'); c.className='cal-cell other-month';
    c.innerHTML='<div class="cal-day">'+(prevDays-i)+'</div>'; grid.appendChild(c);
  }
  for(let day=1;day<=daysInMonth;day++) {
    const c=document.createElement('div');
    const isToday=today.getDate()===day&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    const matches=matchDays[day]||[];
    c.className='cal-cell'+(isToday?' today':'')+(matches.length?' has-match':'');
    c.innerHTML='<div class="cal-day">'+day+'</div>' + (matches.length?'<div class="cal-dot-row">'+matches.slice(0,3).map(()=>'<div class="cal-dot"></div>').join('')+'</div>':'');
    if (matches.length) c.addEventListener('click', ()=>showCalPopup(new Date(calYear,calMonth,day),matches));
    grid.appendChild(c);
  }
  const rem=(7-(firstDow+daysInMonth)%7)%7;
  for(let d=1;d<=rem;d++) {
    const c=document.createElement('div'); c.className='cal-cell other-month';
    c.innerHTML='<div class="cal-day">'+d+'</div>'; grid.appendChild(c);
  }
}
function showCalPopup(date,matches) {
  $id('calPopupDate').textContent=date.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});

  // Build cards with H2H panels, same as fixture list
  let html='';
  matches.forEach(f => {
    html += buildFixCard(f);
    // Add H2H toggle + panel
    const h2hId = 'calh2h_' + f.start.getTime();
    html += '<button class="h2h-toggle" data-id="'+h2hId+'" data-opponent="'+esc(f.opponent)+'">' +
      '<span class="h2h-arrow">\u25BE</span> Previous meetings vs '+esc(f.opponent)+'</button>' +
      '<div class="h2h-panel" id="'+h2hId+'"></div>';
  });

  $id('calPopupContent').innerHTML = html;

  // Wire H2H toggles
  $id('calPopupContent').querySelectorAll('.h2h-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = $id(btn.dataset.id);
      const open  = panel.classList.toggle('open');
      btn.classList.toggle('open', open);
      if (open && !panel.dataset.loaded) {
        panel.dataset.loaded = '1';
        renderH2H(btn.dataset.opponent, null, panel);
      }
    });
  });

  $id('calPopup').classList.remove('hidden');
}
// Swipe left/right on calendar grid to change month
(function(){
  let cx=0;
  const calWrap = document.getElementById('calGrid');
  document.getElementById('pageCalendar').addEventListener('touchstart',e=>{cx=e.touches[0].clientX;},{passive:true});
  document.getElementById('pageCalendar').addEventListener('touchend',e=>{
    const dx=cx-e.changedTouches[0].clientX;
    if(Math.abs(dx)>60){
      if(dx>0){calMonth++;if(calMonth>11){calMonth=0;calYear++;}}
      else{calMonth--;if(calMonth<0){calMonth=11;calYear--;}}
      renderCalendar();
    }
  },{passive:true});
})();

// Countdown
function startCountdown(f) {
  function tick() {
    const wrap=$id('cdWrap'); if(!wrap){clearInterval(cdTimer);return;}
    const diff=f.start.getTime()-Date.now();
    if (f.allDay) {
      const days=Math.ceil(diff/86400000);
      wrap.innerHTML=days<=0?'<div class="matchday-banner">\u26BD MATCH DAY</div>':
        '<div class="countdown-row"><div class="countdown-item"><div class="countdown-num">'+days+'</div><div class="countdown-unit">Days to go</div></div></div>';
      clearInterval(cdTimer); return;
    }
    if (diff<=0){wrap.innerHTML='<div class="matchday-banner">\u26BD KICK OFF!</div>';clearInterval(cdTimer);return;}
    if (diff<86400000){
      const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      wrap.innerHTML='<div class="matchday-banner">\u26BD MATCH DAY \u00B7 Kick off in '+(h?h+'h ':'')+m+'m '+pad(s)+'s</div>'; return;
    }
    const days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000),mins=Math.floor((diff%3600000)/60000),secs=Math.floor((diff%60000)/1000);
    wrap.innerHTML='<div class="countdown-row">' +
      '<div class="countdown-item"><div class="countdown-num">'+pad(days)+'</div><div class="countdown-unit">Days</div></div>' +
      '<div class="countdown-item"><div class="countdown-num">'+pad(hrs)+'</div><div class="countdown-unit">Hours</div></div>' +
      '<div class="countdown-item"><div class="countdown-num">'+pad(mins)+'</div><div class="countdown-unit">Mins</div></div>' +
      '<div class="countdown-item"><div class="countdown-num pulse">'+pad(secs)+'</div><div class="countdown-unit">Secs</div></div></div>';
  }
  tick(); cdTimer=setInterval(tick,1000);
}

// Share
function jumpToNext(venue) {
  // Reset to All venues filter and re-render
  activeHA = 'all'; activeComp = 'all';
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-page="pageFixtures"]').classList.add('active');
  document.getElementById('pageFixtures').classList.add('active');
  filterSection.classList.remove('hidden');
  // Reset filter tabs visually
  document.querySelectorAll('#haRow .tab').forEach(t=>t.classList.remove('active','active-home','active-away'));
  document.querySelector('#haRow .tab[data-ha="all"]').classList.add('active');
  document.querySelectorAll('#compRow .tab').forEach(t=>t.classList.remove('active'));
  const allTab = document.querySelector('#compRow .tab[data-comp="all"]');
  if(allTab) allTab.classList.add('active');
  renderFixtures();
  // Find the target fixture
  const target = allFixtures.find(f => venue==='home' ? f.isHome===true : f.isHome===false);
  if (!target) { showToast('No '+venue+' fixture found'); return; }
  // Scroll to the card matching this exact date
  const targetISO = target.start.toISOString().slice(0,10);
  setTimeout(() => {
    const cards = document.querySelectorAll('.fixture-swipe-wrap');
    let found = false;
    cards.forEach(wrap => {
      if (found) return;
      // Check if this card's date matches
      const dayEl = wrap.querySelector('.fixture-day');
      const dowEl = wrap.querySelector('.fixture-dow');
      if (!dayEl) return;
      // Match by day + dow to narrow it down
      const tDate = target.start;
      const tDay  = String(tDate.getDate());
      const tDow  = tDate.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase();
      if (dayEl.textContent.trim()===tDay && dowEl && dowEl.textContent.trim()===tDow) {
        found = true;
        wrap.scrollIntoView({behavior:'smooth', block:'center'});
        wrap.style.transition = 'background 0.3s';
        wrap.style.background = 'rgba(0,178,169,0.15)';
        setTimeout(()=>{ wrap.style.background=''; }, 1800);
      }
    });
    if (!found) showToast('Next '+venue+' game: '+target.start.toLocaleDateString('en-GB',{day:'numeric',month:'short'}));
  }, 350);
}

function exportAllFixtures() {
  if (!allFixtures.length) { showToast('No fixtures to export'); return; }
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LFC Fixtures//EN\r\nCALSCALE:GREGORIAN\r\n';
  allFixtures.forEach(f => {
    const fmt = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
    const end = f.end ? fmt(f.end) : fmt(new Date(f.start.getTime()+7200000));
    ics += 'BEGIN:VEVENT\r\n';
    ics += 'DTSTART:'+fmt(f.start)+'\r\n';
    ics += 'DTEND:'+end+'\r\n';
    ics += 'SUMMARY:Liverpool FC '+(f.isHome?'v':'@')+' '+f.opponent+'\r\n';
    ics += 'DESCRIPTION:'+(f.competition||'')+'\r\n';
    ics += 'LOCATION:'+(f.venue||'')+'\r\n';
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR';
  const blob = new Blob([ics], {type:'text/calendar'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'LFC-Fixtures-2025-26.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Calendar downloaded!');
}

function shareFixture(f) {
  if (typeof f==='string') f=JSON.parse(f);
  const d=new Date(f.start||f.date);
  const text='\u26BD Liverpool FC '+(f.isHome?'vs':'@')+' '+f.opponent+
    '\n\uD83D\uDCC5 '+d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+
    '\n\uD83D\uDD50 '+formatTime({...f,start:d,allDay:false})+
    (f.competition?'\n\uD83C\uDFC6 '+f.competition:'');
  if (navigator.share) { navigator.share({title:'LFC Fixture',text}).catch(()=>{}); }
  else { navigator.clipboard.writeText(text).then(()=>showToast('Copied!')).catch(()=>showToast('Share not available')); }
}

function buildGCal(f) {
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
  const end=f.end?fmt(f.end):fmt(new Date(f.start.getTime()+7200000));
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(f.summary||'Liverpool FC')+'&dates='+fmt(f.start)+'/'+end+'&location='+encodeURIComponent(f.venue||'');
}
function buildICS(f) {
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
  const end=f.end?fmt(f.end):fmt(new Date(f.start.getTime()+7200000));
  const ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LFC Fixtures//EN\r\nBEGIN:VEVENT\r\n'+
    'DTSTART:'+fmt(f.start)+'\r\nDTEND:'+end+'\r\n'+
    'SUMMARY:Liverpool FC '+(f.isHome?'v':'@')+' '+f.opponent+'\r\n'+
    'DESCRIPTION:'+(f.competition||'')+'\r\nLOCATION:'+(f.venue||'')+'\r\n'+
    'END:VEVENT\r\nEND:VCALENDAR';
  return 'data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
}

// Helpers
function formatTime(f) { return (f.allDay||isTimeUnknown(f)) ? 'TBC' : f.start.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function isTimeUnknown(f) { return f.start.getHours()===0 && f.start.getMinutes()===0; }
function buildDaysPill(date) {
  const now=new Date(); now.setHours(0,0,0,0); const m=new Date(date); m.setHours(0,0,0,0);
  const diff=Math.round((m-now)/86400000);
  if(diff===0)  return '<div class="days-pill today">Today</div>';
  if(diff===1)  return '<div class="days-pill tomorrow">Tomorrow</div>';
  if(diff<=7)   return '<div class="days-pill soon">'+diff+' days</div>';
  return '<div class="days-pill normal">'+diff+' days</div>';
}
function showToast(msg) { const t=$id('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function compShort(n) {
  const m={'Premier League':'Premier League','UEFA Champions League':'Champions League','UEFA Europa League':'Europa League','FA Cup':'FA Cup','EFL Cup':'League Cup','League Cup':'League Cup','Carabao Cup':'League Cup','Club World Cup':'Club World Cup','FIFA Club World Cup':'Club World Cup','Community Shield':'Comm. Shield'};
  return m[n]||n||'Fixture';
}
function getCompClass(n) {
  const k=(n||'').toLowerCase();
  if(k.includes('premier'))   return 'comp-pl';
  if(k.includes('champions')) return 'comp-cl';
  if(k.includes('europa'))    return 'comp-uel';
  if(k.includes('fa cup'))    return 'comp-fa';
  if(k.includes('league cup')||k.includes('efl')||k.includes('carabao')) return 'comp-lc';
  if(k.includes('friendly'))  return 'comp-fr';
  if(k.includes('club world')) return 'comp-cwc';
  return 'comp-other';
}
function getAccentClass(n) {
  const k=(n||'').toLowerCase();
  if(k.includes('premier'))   return 'accent-pl';
  if(k.includes('champions')) return 'accent-cl';
  if(k.includes('europa'))    return 'accent-uel';
  if(k.includes('fa cup'))    return 'accent-fa';
  if(k.includes('league cup')||k.includes('efl')||k.includes('carabao')) return 'accent-lc';
  if(k.includes('club world')) return 'accent-cwc';
  return 'accent-home';
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
