  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --red:#C8102E; --red-dk:#8B0C1F; --gold:#F6C519; }

    [data-theme="dark"] {
      --bg:#0D0D0D; --bg2:#161616; --bg3:#1F1F1F; --border:#242424;
      --white:#F5F5F0; --muted:#777; --muted2:#555;
      --hero-grad:linear-gradient(145deg,#1a0008 0%,#0d0003 60%,#0a0010 100%);
      --hero-border:rgba(200,16,46,0.45);
      --hero-glow:0 0 60px rgba(200,16,46,0.12);
      --header-bg:rgba(13,13,13,0.94);
    }
    [data-theme="light"] {
      --bg:#F0EFEA; --bg2:#FFFFFF; --bg3:#E6E5E0; --border:#D0CFCA;
      --white:#111111; --muted:#666; --muted2:#999;
      --teal:#00B2A9; --teal-faint:rgba(0,178,169,0.12); --teal-mid:rgba(0,178,169,0.25);
      --hero-grad:linear-gradient(145deg,#8B0C1F 0%,#C8102E 60%,#a00020 100%);
      --hero-border:rgba(200,16,46,0.6);
      --hero-glow:0 4px 32px rgba(200,16,46,0.25);
      --header-bg:rgba(240,239,234,0.94);
    }

    html { scroll-behavior:smooth; }
    body {
      background:var(--bg); color:var(--white);
      font-family:'Inter',sans-serif; font-size:15px;
      line-height:1.5; min-height:100vh;
      transition:background 0.25s,color 0.25s;
    }

    /* Header */
    header {
      display:flex; align-items:center; gap:12px;
      padding:14px 20px;
      border-bottom:1px solid var(--border);
      position:sticky; top:0;
      background:var(--header-bg);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      z-index:100;
      transition:background 0.25s,border-color 0.25s;
    }
    .crest { width:34px; height:34px; object-fit:contain; flex-shrink:0; border-radius:50%; }
    [data-theme="light"] .crest { background:#00B2A9; padding:4px; }
    .header-text h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:22px; letter-spacing:1.5px; line-height:1;
    }
    .header-text p { font-size:11px; color:var(--muted); margin-top:1px; }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:7px; }
    .btn-icon {
      background:var(--bg3); border:1px solid var(--border);
      color:var(--muted); width:34px; height:34px;
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:15px;
      transition:color 0.2s,border-color 0.2s,background 0.25s;
    }
    .btn-icon:hover { color:var(--white); border-color:var(--muted); }
    .btn-icon.spinning { animation:spin 0.75s linear infinite; }

    /* Filter section */
    .filter-section {
      border-bottom:1px solid var(--border);
      background:var(--bg);
      transition:background 0.25s,border-color 0.25s;
    }
    .filter-row {
      padding:8px 20px; display:flex; gap:7px;
      overflow-x:auto; scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
    }
    .filter-row::-webkit-scrollbar { display:none; }
    .filter-row + .filter-row { border-top:1px solid var(--border); padding-top:8px; }

    .tab {
      display:inline-flex; align-items:center; gap:5px;
      background:var(--bg3); border:1px solid var(--border); color:var(--muted);
      padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
      cursor:pointer; white-space:nowrap; flex-shrink:0;
      transition:all 0.18s; letter-spacing:0.3px;
    }
    .tab img { width:14px; height:14px; object-fit:contain; }
    .tab:hover { color:var(--white); border-color:var(--muted); }
    .tab.active { background:var(--red); border-color:var(--red); color:#fff; }
    .tab.active-home { background:rgba(200,16,46,0.12); border-color:var(--red); color:var(--red); }
    .tab.active-away { background:rgba(100,100,100,0.12); border-color:var(--muted); color:var(--white); }

    /* Main */
    main { padding-bottom:60px; }
    .content-wrap { max-width:680px; margin:0 auto; }

    /* Hero */
    .hero-section { padding:20px 20px 0; }
    .section-label {
      font-size:10px; font-weight:700;
      letter-spacing:2.5px; text-transform:uppercase;
      color:var(--muted); margin-bottom:10px;
    }
    .hero-card {
      background:var(--hero-grad);
      border:1px solid var(--hero-border);
      border-radius:18px; padding:20px 18px;
      box-shadow:var(--hero-glow);
      position:relative; overflow:hidden; margin-bottom:24px;
    }
    .hero-card::after {
      content:''; position:absolute; top:-80px; right:-80px;
      width:260px; height:260px;
      background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 65%);
      pointer-events:none;
    }
    .hero-comp-row {
      display:flex; align-items:center;
      justify-content:space-between; margin-bottom:18px;
    }
    .hero-comp-badge {
      display:inline-flex; align-items:center; gap:7px;
      background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
      border-radius:20px; padding:5px 12px;
      font-size:12px; font-weight:600; color:#fff;
    }
    .hero-comp-badge img { width:18px; height:18px; object-fit:contain; }
    .hero-round-badge {
      font-size:11px; color:rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:4px 10px;
    }
    .hero-matchup {
      display:flex; align-items:center; justify-content:space-between;
      gap:8px; margin-bottom:18px;
    }
    .hero-team { text-align:center; flex:1; }
    .hero-badge-wrap {
      width:64px; height:64px; margin:0 auto 10px;
      display:flex; align-items:center; justify-content:center;
    }
    .hero-badge-wrap img {
      max-width:64px; max-height:64px; object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }
    .lfc-hero-logo { filter:brightness(10) drop-shadow(0 2px 8px rgba(0,0,0,0.4)) !important; }
    .hero-team-name {
      font-family:'Bebas Neue',sans-serif;
      font-size:16px; letter-spacing:0.8px; line-height:1.2;
      word-break:break-word; color:#fff;
    }
    .hero-vs { font-family:'Bebas Neue',sans-serif; font-size:32px; color:rgba(255,255,255,0.18); flex-shrink:0; }
    .hero-meta { display:flex; flex-wrap:wrap; gap:8px 16px; }
    .hero-meta-item { display:flex; align-items:center; gap:6px; font-size:12.5px; color:rgba(255,255,255,0.65); }
    .ha-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 9px; border-radius:5px; }
    .ha-home    { background:rgba(255,255,255,0.15); color:#fff; }
    .ha-away    { background:rgba(0,0,0,0.25); color:rgba(255,255,255,0.7); }
    .ha-neutral { background:rgba(246,197,25,0.2); color:var(--gold); }

    /* Countdown */
    .countdown-wrap { margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); }
    .countdown-row { display:flex; gap:8px; }
    .countdown-item {
      flex:1; text-align:center;
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.06);
      border-radius:10px; padding:10px 4px;
    }
    .countdown-num { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; color:#fff; }
    .countdown-unit { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:3px; }
    .matchday-banner {
      text-align:center; padding:12px;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
      border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:#fff;
    }
    .cal-row { margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.07); }
    .cal-btn {
      display:inline-flex; align-items:center; gap:6px;
      color:rgba(255,255,255,0.45); font-size:12px; text-decoration:none;
      padding:5px 10px; border:1px solid rgba(255,255,255,0.1); border-radius:6px;
      transition:color 0.2s,border-color 0.2s;
    }
    .cal-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }

    /* Fixture list */
    .fixtures-section { padding:0 20px; }
    .month-header {
      font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; color:var(--muted2);
      padding:20px 0 8px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      transition:border-color 0.25s;
    }
    .month-count { font-family:'Inter',sans-serif; font-size:11px; font-weight:600; color:var(--muted2); }

    .fixture-card {
      display:flex; align-items:stretch;
      border-bottom:1px solid var(--border);
      transition:background 0.15s,border-color 0.25s;
    }
    .fixture-card:hover { background:rgba(200,16,46,0.04); }
    [data-theme="light"] .fixture-card:hover { background:rgba(0,178,169,0.06); }

    /* Light mode sea green accents */
    [data-theme="light"] .section-label { color:#00B2A9; }
    [data-theme="light"] .month-header { color:#00B2A9; border-bottom-color:#00B2A9; opacity:0.85; }
    [data-theme="light"] .filter-row + .filter-row { border-top-color:#00B2A9; border-top-opacity:0.3; }
    [data-theme="light"] .tab.active { background:#00B2A9; border-color:#00B2A9; color:#fff; }
    [data-theme="light"] .tab.active-home { background:rgba(200,16,46,0.1); border-color:var(--red); color:var(--red); }
    [data-theme="light"] .tab.active-away { background:rgba(0,178,169,0.1); border-color:#00B2A9; color:#00B2A9; }
    [data-theme="light"] .fixture-accent.home { background:var(--red); }
    [data-theme="light"] .fixture-accent.away { background:#00B2A9; }
    [data-theme="light"] .days-pill.today    { background:rgba(200,16,46,0.1); color:var(--red); }
    [data-theme="light"] .days-pill.tomorrow { background:rgba(0,178,169,0.15); color:#008f87; }
    [data-theme="light"] .days-pill.soon     { background:rgba(0,178,169,0.1); color:#008f87; }
    [data-theme="light"] .days-pill.normal   { background:rgba(0,0,0,0.06); color:#666; }
    [data-theme="light"] .spinner { border-color:#D0CFCA; border-top-color:#00B2A9; }
    [data-theme="light"] .btn-icon:hover { color:#00B2A9; border-color:#00B2A9; }
    [data-theme="light"] .filter-section { border-bottom-color:#00B2A9; border-bottom-width:2px; }

    .fixture-accent { width:3px; flex-shrink:0; }
    .fixture-accent.home    { background:var(--red); }
    .fixture-accent.away    { background:var(--bg3); transition:background 0.25s; }
    .fixture-accent.neutral { background:var(--gold); }

    .fixture-inner { display:flex; align-items:center; gap:11px; padding:12px 0 12px 12px; flex:1; min-width:0; }
    .fixture-date-col { width:38px; flex-shrink:0; text-align:center; }
    .fixture-day { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; }
    .fixture-dow { font-size:9.5px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .fixture-divider { width:1px; align-self:stretch; background:var(--border); flex-shrink:0; margin:4px 0; transition:background 0.25s; }
    .fixture-main { flex:1; min-width:0; }
    .fixture-opponent { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .opp-badge { width:24px; height:24px; flex-shrink:0; object-fit:contain; }
    .opp-name { font-weight:600; font-size:14px; line-height:1.3; word-break:break-word; }
    .fixture-sub { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .comp-badge {
      display:inline-flex; align-items:center; gap:4px;
      font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; white-space:nowrap;
    }
    .comp-badge img { width:11px; height:11px; object-fit:contain; }
    .round-tag { font-size:10.5px; color:var(--muted); }
    .venue-tag { font-size:10.5px; color:var(--muted); }

    .fixture-right { flex-shrink:0; text-align:right; padding-right:14px; min-width:64px; }
    .fixture-time { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:0.5px; line-height:1; }
    .fixture-time.tbc { color:var(--muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:600; }

    .days-pill { display:inline-block; margin-top:5px; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; white-space:nowrap; }
    .days-pill.today    { background:rgba(200,16,46,0.15); color:var(--red); }
    .days-pill.tomorrow { background:rgba(246,197,25,0.15); color:#c9a000; }
    .days-pill.soon     { background:rgba(46,204,113,0.12); color:#3dba78; }
    .days-pill.normal   { background:rgba(120,120,120,0.12); color:var(--muted); }
    [data-theme="dark"] .days-pill.tomorrow { color:var(--gold); }

    .comp-pl    { background:rgba(60,0,180,0.15); color:#a88fff; }
    .comp-cl    { background:rgba(0,50,130,0.15); color:#70b8ff; }
    .comp-fa    { background:rgba(190,90,0,0.15); color:#ffb347; }
    .comp-lc    { background:rgba(0,120,70,0.15); color:#4ddba8; }
    .comp-uel   { background:rgba(246,197,25,0.12); color:#8a6e00; }
    .comp-cwc   { background:rgba(0,180,180,0.12); color:#5de0e2; }
    .comp-fr    { background:rgba(100,100,100,0.12); color:#888; }
    .comp-other { background:rgba(100,100,100,0.12); color:#999; }
    [data-theme="dark"] .comp-uel { color:var(--gold); }

    /* States */
    .state-view { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 30px; text-align:center; gap:12px; }
    .state-icon { font-size:42px; }
    .state-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
    .state-msg { color:var(--muted); font-size:13.5px; max-width:300px; line-height:1.7; }
    .retry-btn { margin-top:8px; background:var(--red); color:#fff; border:none; border-radius:10px; padding:12px 28px; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:1px; cursor:pointer; }
    .retry-btn:hover { background:var(--red-dk); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hidden { display:none !important; }
    .no-results { padding:40px 20px; text-align:center; color:var(--muted); }
    .no-results .icon { font-size:32px; margin-bottom:10px; }

    @media (min-width:680px) {
      header { padding:16px 32px; }
      .filter-row { padding-left:32px; padding-right:32px; }
      .hero-section { padding:24px 32px 0; }
      .fixtures-section { padding:0 32px; }
      .hero-badge-wrap { width:72px; height:72px; }
      .hero-badge-wrap img { max-width:72px; max-height:72px; }
    }
    @media (prefers-reduced-motion:reduce) { .spinner,.btn-icon.spinning { animation:none; } }
  </style>
</head>

// Fuzzy comp logo lookup — falls back to partial keyword matching
function getCompLogo(c) {
  if (!c) return null;
  const k = c.toLowerCase().trim();
  if (COMP_LOGOS[k]) return COMP_LOGOS[k];
  // Partial keyword fallback
  if (k.includes('premier'))                      return COMP_LOGOS['premier league'];
  if (k.includes('champions'))                    return COMP_LOGOS['champions league'];
  if (k.includes('europa'))                       return COMP_LOGOS['europa league'];
  if (k.includes('fa cup') || k === 'fa cup')    return COMP_LOGOS['fa cup'];
  if (k.includes('carabao') || k.includes('efl cup') || k.includes('league cup')) return COMP_LOGOS['carabao cup'];
  if (k.includes('community shield'))             return COMP_LOGOS['community shield'];
  if (k.includes('club world'))                   return COMP_LOGOS['club world cup'];
  return null;
}

// Smart badge lookup: tries exact, then strips FC/AFC, then partial keyword match
function getClubBadge(name) {
  if (!name) return null;
  const raw = name.toLowerCase().trim();

  // 1. Direct match
  if (BADGES[raw]) return BADGES[raw];

  // 2. Strip common prefixes/suffixes and try again
  const stripped = raw
    .replace(/^(fc|afc|as|ss|ac|rb|rsc|sl|bv|vfb|psv|1\.?\s*fc|cf)\s+/, '')
    .replace(/\s+(fc|afc|cf|sc|sk|ac|united|city|town|rovers|wanderers|athletic|albion|hotspur|county|palace|forest|wednesday|north end|park rangers)$/, '')
    .trim();
  if (BADGES[stripped]) return BADGES[stripped];

  // 3. Partial match — find first badge key that appears in or contains the name
  for (const [key, url] of Object.entries(BADGES)) {
    if (raw.includes(key) || key.includes(raw)) return url;
  }

  return null;
}

async function fetchICS(silent) {
  try {
    const res = await fetch(WORKER_URL);
    const text = await res.text();
    if (!res.ok) throw new Error('HTTP '+res.status+': '+text.slice(0,120));
    allFixtures = parseICS(text);
    localStorage.setItem(CACHE_KEY, JSON.stringify(allFixtures.map(f=>({...f,start:f.start.toISOString(),end:f.end?f.end.toISOString():null}))));
    lastUpdated.textContent = 'Men\'s First Team · Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    buildUI(); show('fixtures');
  } catch(err) {
    if (!silent) { $id('errorMsg').textContent = err.message||'Could not fetch fixtures.'; show('error'); }
  }
}

function parseICS(text) {
  const now=new Date(); now.setHours(0,0,0,0);
  const lines=text.replace(/\r\n[ \t]/g,'').replace(/\r/g,'').split('\n');
  const events=[]; let cur=null;
  for (const raw of lines) {
    const line=raw.trim();
    if (line==='BEGIN:VEVENT') { cur={}; continue; }
    if (line==='END:VEVENT'&&cur) { if(cur.start&&cur.start>=now) events.push(cur); cur=null; continue; }
    if (!cur) continue;
    const ci=line.indexOf(':'); if(ci===-1) continue;
    const key=line.slice(0,ci).split(';')[0].toUpperCase();
    const val=line.slice(ci+1);
    if (key==='SUMMARY')     cur.summary    =dv(val);
    if (key==='LOCATION')    cur.location   =dv(val);
    if (key==='DESCRIPTION') cur.description=dvDesc(val);
    if (key==='URL')         cur.url        =val.trim();
    if (key==='DTSTART') { const p=pd(val,line); cur.start=p.date; cur.allDay=p.allDay; }
    if (key==='DTEND')   { const p=pd(val,line); cur.end=p.date; }
  }
  events.sort((a,b)=>a.start-b.start);
  return events.map(enrich);
}
function pd(v,fl) {
  const allDay=fl.includes('VALUE=DATE')||/^\d{8}$/.test(v.trim()); const s=v.trim(); let date;
  if (allDay) { date=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8)); }
  else { const y=+s.slice(0,4),mo=+s.slice(4,6)-1,d=+s.slice(6,8),h=+s.slice(9,11),mi=+s.slice(11,13),sc=+s.slice(13,15); date=s.endsWith('Z')?new Date(Date.UTC(y,mo,d,h,mi,sc)):new Date(y,mo,d,h,mi,sc); }
  return {date,allDay};
}
function dv(v) { return v.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/gi,' ').replace(/\\\\/g,'\\').trim(); }
// Description variant: preserve \n as real newlines so we can split on first line
function dvDesc(v) { return v.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/gi,'\n').replace(/\\\\/g,'\\').trim(); }
function enrich(e) {
  const s=e.summary||''; let comp='',home='',away='',isHome=null;

  // Competition = first line of DESCRIPTION, text before the first pipe
  // e.g. "Premier League | Follow the live action on the Liverpool website..."
  if (e.description) {
    const firstLine = e.description.split('\n')[0].trim();
    const pipeIdx   = firstLine.indexOf('|');
    comp = (pipeIdx > 0 ? firstLine.slice(0, pipeIdx) : firstLine).trim();
  }

  // SUMMARY is the match teams: "Liverpool v Fulham" or "Arsenal v Liverpool"
  const vs = s.split(/\s+v(?:s)?\.?\s+/i);
  if (vs.length===2) { home=vs[0].trim(); away=vs[1].trim(); }

  const lfc=['liverpool','lfc','liverpool fc'];
  if (lfc.some(n=>home.toLowerCase().includes(n))) isHome=true;
  if (lfc.some(n=>away.toLowerCase().includes(n))) isHome=false;
  const opponent=isHome===true?away:isHome===false?home:s;

  const venue=e.location||(isHome===true?'Anfield':'');
  return {...e,competition:comp,opponent:opponent||s,isHome,round:'',venue};
}


function buildUI() { buildCompTabs(); renderFixtures(); }

function buildCompTabs() {
  const counts={};
  allFixtures.forEach(f=>{const c=f.competition||'Other'; counts[c]=(counts[c]||0)+1;});
  const order=['Premier League','UEFA Champions League','UEFA Europa League','FA Cup','EFL Cup','League Cup','Carabao Cup','Club World Cup','FIFA Club World Cup','Community Shield'];
  const sorted=[...order.filter(c=>counts[c]),...Object.keys(counts).filter(c=>!order.includes(c))];
  compRow.innerHTML=`<button class="tab active" data-comp="all">All (${allFixtures.length})</button>`;
  sorted.forEach(c=>{
    const logo=getCompLogo(c); const btn=document.createElement('button');
    btn.className='tab'; btn.dataset.comp=c;
    btn.innerHTML=(logo?`<img src="${logo}" alt="" onerror="this.style.display='none'" />`:'') + compShort(c) + ` (${counts[c]})`;
    compRow.appendChild(btn);
  });
  filterSection.classList.remove('hidden');
  compRow.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      compRow.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active'); activeComp=t.dataset.comp; renderFixtures();
    });
  });
}

function getFiltered() {
  let list = activeComp==='all' ? allFixtures : allFixtures.filter(f=>f.competition===activeComp);
  if (activeHA==='home') list=list.filter(f=>f.isHome===true);
  if (activeHA==='away') list=list.filter(f=>f.isHome===false);
  return list;
}

function renderFixtures() {
  clearInterval(cdTimer);
  const list=getFiltered();
  if (!list.length) {
    fixturesContent.innerHTML=`<div class="no-results"><div class="icon">📭</div><div>No fixtures match your filters.</div></div>`;
    return;
  }
  let html=buildHero(list[0]);
  if (list.length>1) {
    html+=`<div class="fixtures-section">`;
    const byMonth={};
    list.slice(1).forEach(f=>{
      const k=f.start.getFullYear()+'-'+String(f.start.getMonth()+1).padStart(2,'0');
      (byMonth[k]=byMonth[k]||[]).push(f);
    });
    Object.entries(byMonth).forEach(([k,fixtures])=>{
      const [y,m]=k.split('-');
      const label=new Date(+y,+m-1).toLocaleString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
      html+=`<div class="month-group"><div class="month-header"><span>${label}</span><span class="month-count">${fixtures.length} FIXTURE${fixtures.length!==1?'S':''}</span></div>`;
      fixtures.forEach(f=>{html+=buildCard(f);});
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  fixturesContent.innerHTML=html;
  startCountdown(list[0]);
}

function buildHero(f) {
  const comp=f.competition||'Fixture', cLogo=getCompLogo(comp), oppBadge=getClubBadge(f.opponent);
  const isHome=f.isHome;
  const haClass=isHome===true?'ha-home':isHome===false?'ha-away':'ha-neutral';
  const haText=isHome===true?'HOME':isHome===false?'AWAY':'NEUTRAL';
  const dateStr=f.start.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  return `
  <div class="hero-section">
    <div class="section-label">Next Match</div>
    <div class="hero-card">
      <div class="hero-comp-row">
        <div class="hero-comp-badge">
          ${cLogo?`<img src="${cLogo}" alt="" onerror="this.style.display='none'" />`:''}
          <span>${esc(comp)}</span>
        </div>
        ${f.round?`<span class="hero-round-badge">${esc(f.round)}</span>`:''}
      </div>
      <div class="hero-matchup">
        <div class="hero-team">
          <div class="hero-badge-wrap"><img src="${LFC_LOGO}" alt="Liverpool FC" class="lfc-hero-logo" /></div>
          <div class="hero-team-name">Liverpool FC</div>
        </div>
        <div class="hero-vs">VS</div>
        <div class="hero-team">
          <div class="hero-badge-wrap">
            ${oppBadge?`<img src="${oppBadge}" alt="${esc(f.opponent)}" onerror="this.outerHTML='<span style=\\'font-size:36px;\\'>⚽</span>'" />`:`<span style="font-size:36px;">⚽</span>`}
          </div>
          <div class="hero-team-name">${esc(f.opponent)}</div>
        </div>
      </div>
      <div class="hero-meta">
        <div class="hero-meta-item">📅 ${dateStr}</div>
        <div class="hero-meta-item">🕐 ${formatTime(f)}</div>
        ${f.venue?`<div class="hero-meta-item">📍 ${esc(f.venue)}</div>`:''}
        <div class="hero-meta-item"><span class="ha-badge ${haClass}">${haText}</span></div>
      </div>
      <div class="countdown-wrap" id="cdWrap"></div>
      <div class="cal-row"><a class="cal-btn" href="${buildGCal(f)}" target="_blank" rel="noopener">📅 Add to Google Calendar</a></div>
    </div>
  </div>`;
}

function buildCard(f) {
  const d=f.start, isHome=f.isHome;
  const accentCls=isHome===true?'home':isHome===false?'away':'neutral';
  const cCls=getCompClass(f.competition), cLogo=getCompLogo(f.competition), oppBadge=getClubBadge(f.opponent);
  return `
  <div class="fixture-card">
    <div class="fixture-accent ${accentCls}"></div>
    <div class="fixture-inner">
      <div class="fixture-date-col">
        <div class="fixture-day">${d.getDate()}</div>
        <div class="fixture-dow">${d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()}</div>
      </div>
      <div class="fixture-divider"></div>
      <div class="fixture-main">
        <div class="fixture-opponent">
          ${oppBadge?`<img class="opp-badge" src="${oppBadge}" alt="${esc(f.opponent)}" onerror="this.style.display='none'" />`:''}
          <span class="opp-name">${esc(f.opponent)}</span>
        </div>
        <div class="fixture-sub">
          <span class="comp-badge ${cCls}">
            ${cLogo?`<img src="${cLogo}" alt="" onerror="this.style.display='none'" />`:''}
            ${compShort(f.competition)}
          </span>
          ${f.round?`<span class="round-tag">${esc(f.round)}</span>`:''}
          ${f.venue?`<span class="venue-tag">· ${esc(f.venue)}</span>`:''}
        </div>
      </div>
      <div class="fixture-right">
        <div class="fixture-time${(f.allDay||isTimeUnknown(f))?' tbc':''}">${formatTime(f)}</div>
        ${buildDaysPill(f.start)}
      </div>
    </div>
  </div>`;
}

function startCountdown(f) {
  function tick() {
    const wrap=$id('cdWrap'); if(!wrap){clearInterval(cdTimer);return;}
    const diff=f.start.getTime()-Date.now();
    if (f.allDay) {
      const days=Math.ceil(diff/86400000);
      wrap.innerHTML=days<=0?`<div class="matchday-banner">⚽ MATCH DAY</div>`:`<div class="countdown-row"><div class="countdown-item"><div class="countdown-num">${days}</div><div class="countdown-unit">Days to go</div></div></div>`;
      clearInterval(cdTimer); return;
    }
    if (diff<=0) { wrap.innerHTML=`<div class="matchday-banner">⚽ MATCH DAY — KICK OFF!</div>`; clearInterval(cdTimer); return; }
    if (diff<86400000) {
      const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      wrap.innerHTML=`<div class="matchday-banner">⚽ MATCH DAY · Kick off in ${h?h+'h ':''}${m}m ${pad(s)}s</div>`; return;
    }
    const days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000),mins=Math.floor((diff%3600000)/60000),secs=Math.floor((diff%60000)/1000);
    wrap.innerHTML=`<div class="countdown-row">
      <div class="countdown-item"><div class="countdown-num">${pad(days)}</div><div class="countdown-unit">Days</div></div>
      <div class="countdown-item"><div class="countdown-num">${pad(hrs)}</div><div class="countdown-unit">Hours</div></div>
      <div class="countdown-item"><div class="countdown-num">${pad(mins)}</div><div class="countdown-unit">Mins</div></div>
      <div class="countdown-item"><div class="countdown-num">${pad(secs)}</div><div class="countdown-unit">Secs</div></div>
    </div>`;
  }
  tick(); cdTimer=setInterval(tick,1000);
}

function formatTime(f) { return (f.allDay||isTimeUnknown(f))?'TBC':f.start.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function isTimeUnknown(f) { return f.start.getHours()===0&&f.start.getMinutes()===0; }
function buildDaysPill(date) {
  const now=new Date(); now.setHours(0,0,0,0); const m=new Date(date); m.setHours(0,0,0,0);
  const diff=Math.round((m-now)/86400000);
  if(diff===0) return `<div class="days-pill today">Today</div>`;
  if(diff===1) return `<div class="days-pill tomorrow">Tomorrow</div>`;
  if(diff<=7)  return `<div class="days-pill soon">${diff} days</div>`;
  return `<div class="days-pill normal">${diff} days</div>`;
}
function buildGCal(f) {
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
  const end=f.end?fmt(f.end):fmt(new Date(f.start.getTime()+7200000));
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(f.summary||'Liverpool FC')}&dates=${fmt(f.start)}/${end}&location=${encodeURIComponent(f.venue||'')}`;
}
function compShort(n) {
  const m={'Premier League':'Premier League','UEFA Champions League':'Champions League','UEFA Europa League':'Europa League','FA Cup':'FA Cup','EFL Cup':'League Cup','League Cup':'League Cup','Carabao Cup':'League Cup','Club World Cup':'Club World Cup','FIFA Club World Cup':'Club World Cup','Community Shield':'Comm. Shield'};
  return m[n]||n||'Fixture';
}
function getCompClass(n) {
  const k=(n||'').toLowerCase();
  if(k.includes('premier'))   return 'comp-pl';
  if(k.includes('champions')) return 'comp-cl';
  if(k.includes('europa'))    return 'comp-uel';
  if(k.includes('fa cup'))    return 'comp-fa';
  if(k.includes('league cup')||k.includes('efl')||k.includes('carabao')) return 'comp-lc';
  if(k.includes('friendly'))  return 'comp-fr';
  if(k.includes('club world')) return 'comp-cwc';
  return 'comp-other';
}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function show(v){
  ['loadingState','errorState','fixturesContent'].forEach(id=>$id(id).classList.add('hidden'));
  if(v==='loading') $id('loadingState').classList.remove('hidden');
  if(v==='error')   $id('errorState').classList.remove('hidden');
  if(v==='fixtures') $id('fixturesContent').classList.remove('hidden');
}
</script>
